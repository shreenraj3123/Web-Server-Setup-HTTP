# Sample Nginx Configuration for this Project
server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Custom Error Page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
